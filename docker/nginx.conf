# ============================================
# Nginx Configuration per React SPA
# ============================================
# 
# Questa configurazione:
# - Serve i file statici di React
# - Gestisce routing client-side (redirect a index.html)
# - Abilita gzip per performance
# - Cache per asset statici
#
# ============================================

server {
    listen 80;
    server_name localhost;
    
    # Root directory
    root /usr/share/nginx/html;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    
    # Cache per asset statici (JS, CSS, immagini)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Non cachare index.html (per aggiornamenti)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    
    # Tutte le route vanno a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
