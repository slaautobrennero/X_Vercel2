# ============================================
# SLA PORTALE - Docker Compose
# ============================================
# 
# Per avviare l'applicazione:
#   docker-compose up -d
#
# Per vedere i log:
#   docker-compose logs -f
#
# Per fermare:
#   docker-compose down
#
# Per ricostruire dopo modifiche:
#   docker-compose up -d --build
#
# ============================================

version: '3.8'

services:
  # ==========================================
  # MongoDB - Database
  # ==========================================
  # NOTA RASPBERRY PI:
  # - Raspberry Pi 4 con OS 64-bit: usa mongo:6.0 (OK)
  # - Raspberry Pi 4 con OS 32-bit: cambia in mongo:4.4
  # Per verificare: uname -m
  #   - aarch64 = 64-bit (OK mongo:6.0)
  #   - armv7l = 32-bit (usa mongo:4.4)
  # ==========================================
  mongodb:
    image: mongo:4.4.18  # ARM64 + dati esistenti del Pi sono Mongo 4.4
    container_name: sla-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      # Autenticazione MongoDB (impostata al primo avvio del container).
      # Le credenziali stanno in docker/.env (MONGO_ROOT_USERNAME / MONGO_ROOT_PASSWORD).
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD obbligatorio in docker/.env}
    # Porta 27017 NON esposta: il DB è raggiungibile solo dalla rete Docker interna
    networks:
      - sla-network

  # ==========================================
  # Backend - FastAPI
  # ==========================================
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: sla-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      # Database (con autenticazione)
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      DB_NAME: sla_sindacato
      
      # JWT - CAMBIA IN PRODUZIONE!
      JWT_SECRET: ${JWT_SECRET:-genera-una-chiave-segreta-lunga-almeno-32-caratteri}
      
      # Admin iniziale (solo al primo avvio se non esiste già)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-superadmin@sla.it}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-CambiaQuestaPassword!}
      
      # Google Maps (opzionale)
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      
      # Frontend URL per CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8001:8001"
    networks:
      - sla-network

  # ==========================================
  # Frontend - React (build statico con Nginx)
  # ==========================================
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: sla-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - sla-network

# ==========================================
# Volumi persistenti
# ==========================================
volumes:
  mongodb_data:
    name: sla-mongodb-data
  uploads_data:
    name: sla-uploads-data

# ==========================================
# Rete interna
# ==========================================
networks:
  sla-network:
    name: sla-network
    driver: bridge
